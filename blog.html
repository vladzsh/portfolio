<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved !== 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <nav class="nav">

      <a href="index.html" class="nav-logo">vladzsh</a>
    </div>
    <button class="nav-hamburger" aria-label="Toggle menu">&#9776;</button>
    <div class="nav-links">
      <a href="index.html#projects">Projects</a>
      <a href="index.html#experience">Experience</a>
      <a href="index.html#about">About</a>
      <a href="blog.html" class="active">Blog</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </nav>

  <section class="blog-page">
    <div class="container">
      <h1 class="section-title">Blog</h1>
      <div class="blog-list reveal">
        <!-- Rendered by blog.js -->
      </div>
    </div>
  </section>

  <div class="theme-toggle-wrap">
    <span class="theme-label">Toggle Theme</span>
    <button class="theme-toggle" aria-label="Toggle theme"></button>
  </div>

  <footer class="footer">
    &copy; 2026 Vladyslav Zhuravel. All rights reserved.

  <script src="data.js"></script>
